name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Force Node.js 24 untuk actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'  # Ubah ke 22 (LTS terbaru)
          cache: 'npm'
      
      - name: Verify Node version
        run: node --version  # Should show v22.x.x
      
      - name: Install dependencies
        run: npm ci
      
      - name: Create web directory
        run: mkdir -p www
      
      - name: Copy web assets
        run: |
          if [ -f "index.html" ]; then cp index.html www/; else echo "index.html not found"; exit 1; fi
          if [ -f "app.js" ]; then cp app.js www/; else echo "app.js not found"; exit 1; fi
          [ -f "styles.css" ] && cp styles.css www/ || true
      
      - name: Build web app
        run: npm run build || echo "No build script, skipping"
      
      - name: List www contents
        run: ls -la www/
      
      - name: Sync Capacitor
        run: npx cap sync android
      
      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew
      
      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: finansight-debug
          path: android/app/build/outputs/apk/debug/*.apk
          compression-level: 0
          retention-days: 30
          if-no-files-found: error