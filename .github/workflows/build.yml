name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java 17 (BUKAN 21)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Create web directory
        run: |
          mkdir -p www
          cp index.html www/ || true
          cp app.js www/ || true
      
      - name: Sync Capacitor
        run: npx cap sync android
      
      - name: Fix Gradle configuration
        run: |
          # Update gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "org.gradle.caching=true" >> android/gradle.properties
          
      - name: Grant execute permission
        run: chmod +x android/gradlew
        
      - name: Clean Gradle cache
        run: |
          cd android
          ./gradlew clean
          rm -rf .gradle
          rm -rf ~/.gradle/caches/
      
      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon --stacktrace
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: finansight-debug
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30