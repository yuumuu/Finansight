name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java 21 (Required for Capacitor)
        uses: actions/setup-java@v4
        with:
          java-version: '21'  # Ubah dari 17 ke 21
          distribution: 'temurin'
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Verify Java version
        run: java -version
      
      - name: Verify Node version
        run: node --version
      
      - name: Install dependencies
        run: npm ci
      
      - name: Create web directory
        run: mkdir -p www
      
      - name: Copy web assets
        run: |
          cp index.html www/ 2>/dev/null || echo "index.html not found"
          cp app.js www/ 2>/dev/null || echo "app.js not found"
          ls -la www/
      
      - name: Build web app
        run: npm run build || echo "Build script not found"
      
      - name: Sync Capacitor
        run: npx cap sync android
      
      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew
      
      - name: Build Debug APK with Java 21
        run: cd android && ./gradlew assembleDebug
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: finansight-debug
          path: android/app/build/outputs/apk/debug/*.apk
          compression-level: 0
          retention-days: 30
          if-no-files-found: error